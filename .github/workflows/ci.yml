name: CI

on:
  push:
    paths:
      - "Agentic-writer/**"
  pull_request:
    paths:
      - "Agentic-writer/**"

defaults:
  run:
    working-directory: Agentic-writer

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: uv sync --all-extras
      - run: uv run pytest -m "bootstrap or unit or integration or ui"
